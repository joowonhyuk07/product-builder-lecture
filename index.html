<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 다크 모드</button>
    </div>
    <div class="container">
        <header>
            <h1>🍀 행운의 로또 추천</h1>

            <p>당신의 행운을 시험해 보세요!</p>
        </header>

        <main>
            <div id="ball-container" class="ball-container">
                <div class="placeholder-ball">?</div>
                <div class="placeholder-ball">?</div>
                <div class="placeholder-ball">?</div>
                <div class="placeholder-ball">?</div>
                <div class="placeholder-ball">?</div>
                <div class="placeholder-ball">?</div>
            </div>

            <div class="controls">
                <div class="input-group">
                    <label for="include-nums">포함할 번호 (쉼표로 구분)</label>
                    <input type="text" id="include-nums" placeholder="예: 7, 21">
                </div>
                <div class="input-group">
                    <label for="exclude-nums">제외할 번호 (쉼표로 구분)</label>
                    <input type="text" id="exclude-nums" placeholder="예: 1, 45">
                </div>
                <button id="generate-btn" class="generate-btn">번호 생성하기</button>
            </div>

            <section class="contact-section">
                <h2>🤝 제휴 문의</h2>
                <form action="https://formspree.io/f/myklnryy" method="POST" class="contact-form">
                    <div class="input-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" placeholder="제휴 관련 내용을 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="generate-btn">문의하기</button>
                </form>
                <p class="form-link">
                    <a href="https://product-builder-lecture-9tm.pages.dev" target="_blank">프로젝트 상세 보기</a>
                </p>
            </section>

            <section class="comment-section">
                <h2>💬 댓글</h2>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://product-builder-ewjecgrhyq.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
    <script id="dsq-count-scr" src="//product-builder-ewjecgrhyq.disqus.com/count.js" async></script>
</body>
</html>
